# Standalone nginx master for the on-site agent's LAN speed test. This runs as our
# OWN nginx instance - never the host's system nginx - wrapping the shared server
# block (nginx.conf) in a minimal http{}. Both the Docker image and the bare-metal
# installer use this same file; the placeholder paths (__PIDFILE__, __ERRORLOG__,
# __SERVERCONF__) are filled in at build / install time for each environment.
worker_processes auto;
pid __PIDFILE__;
error_log __ERRORLOG__ warn;
events { worker_connections 4096; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    include __SERVERCONF__;
}
