# Network Optimizer on-site agent.
#
# The agent dials OUT to the central server over HTTPS only - no inbound access
# to the site is required for the tunnel. Host networking is used so latency/loss
# probes see the site's real network position (and per-WAN source binding works),
# and so the optional LAN speed test (port 3000) and iperf3 (port 5201) are
# reachable by site clients on the host's address.
#
# scripts/agent/install.sh writes ./data/agent.json (server URL + enrollment
# token) before first start. The agent persists its key there on enrollment.

services:
  network-optimizer-agent:
    # ⚠️ TEMPORARY HACK — main ONLY, DO NOT SHIP TO STABLE 2.0 GA. Pinned to the
    # 2.0 preview tag so the beta agent one-liner (fetched from `main`) works
    # before GA. FIX before release/2.0-multi-site -> main: restore :latest /
    # real version handling. BUMP this tag on every new beta.
    image: ghcr.io/ozark-connect/agent:2.0.0-beta.5
    container_name: network-optimizer-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    environment:
      - TZ=${TZ:-UTC}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
