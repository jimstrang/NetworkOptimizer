# OpenSpeedTest served by nginx on the on-site agent. The transfer legs
# (/downloading via sendfile, /upload) run here so the agent saturates 10 GbE on
# modest hardware; result posts + the results link proxy to the agent's loopback
# relay (127.0.0.1:3001), which forwards them to the central server with the site
# slug and the real client IP. Same-origin, so no CORS is needed.
server {
    server_name _;
    listen 3000 reuseport;
    listen [::]:3000 reuseport;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;
    error_page 405 =200 $uri;
    access_log off;
    gzip off;
    log_not_found off;
    server_tokens off;
    error_log /dev/null;
    tcp_nodelay on;
    tcp_nopush on;
    sendfile on;
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # Result posts + the "view results" link relay through the agent's loopback
    # listener (site slug + real client IP forwarded on to the central server).
    location /api/public/speedtest/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        client_max_body_size 20m;
    }

    location = /client-speedtest {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # Upload endpoint - reads the entire POST body before responding (the
    # error_page 405 hack alone would respond before the body is received).
    location = /upload {
        add_header Cache-Control 'no-store, no-cache, max-age=0, no-transform';
        client_body_buffer_size 35m;
        client_max_body_size 50m;
        proxy_pass http://127.0.0.1:3000/upload-sink;
        proxy_set_header Host $host;
    }

    location = /upload-sink {
        return 200;
    }

    location / {
        add_header Cache-Control 'no-store, no-cache, max-age=0, no-transform';
        add_header Last-Modified $date_gmt;
        if_modified_since off;
        expires off;
        etag off;
    }

    # Static assets - match OpenSpeedTest's own caching.
    location ~* ^.+\.(?:css|cur|js|jpe?g|gif|htc|ico|png|html|xml|otf|ttf|eot|woff|woff2|svg)$ {
        access_log off;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        open_file_cache max=3000 inactive=120s;
        open_file_cache_valid 45s;
        open_file_cache_min_uses 2;
        open_file_cache_errors off;
        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    }
}
