syntax = "proto3";

option csharp_namespace = "NetworkOptimizer.AgentProtocol";

package networkoptimizer.agent.v1;

// Persistent bidirectional tunnel between an on-site agent and the central
// Network Optimizer server. The agent dials out (no inbound ports at the
// remote site), authenticates with its agent key in the first message, then
// the stream stays open for heartbeats, probe configuration pushes, and probe
// result batches.
service AgentTunnel {
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);
}

message AgentMessage {
  oneof payload {
    AgentHello hello = 1;
    AgentHeartbeat heartbeat = 2;
    ProbeResultBatch probe_results = 3;
    ProxyOpenResult proxy_open_result = 4;
    ProxyData proxy_data = 5;
    ProxyClose proxy_close = 6;
    SnmpResultBatch snmp_results = 7;
    Iperf3ClientResult iperf3_result = 8;
  }
}

message ServerMessage {
  oneof payload {
    ServerHello hello = 1;
    ProbeConfig probe_config = 2;
    ProxyOpen proxy_open = 3;
    ProxyData proxy_data = 4;
    ProxyClose proxy_close = 5;
    SnmpConfig snmp_config = 6;
    Iperf3ClientRequest iperf3_request = 7;
  }
}

// ---- TCP proxying (SSH / UniFi Console reach into the site) ----
// The server multiplexes raw TCP connections over the tunnel: ProxyOpen asks
// the agent to dial a site-local host:port, then ProxyData frames flow both
// ways under a server-assigned connection id until either side closes.

message ProxyOpen {
  int64 connection_id = 1;
  string host = 2;
  int32 port = 3;
}

message ProxyOpenResult {
  int64 connection_id = 1;
  bool ok = 2;
  string error = 3;
}

message ProxyData {
  int64 connection_id = 1;
  bytes data = 2;
}

message ProxyClose {
  int64 connection_id = 1;
}

// First message on every connection. The server closes the stream with
// UNAUTHENTICATED if the key does not resolve to an enabled, enrolled agent.
message AgentHello {
  string agent_key = 1;
  string version = 2;
}

message ServerHello {
  string site_slug = 1;
  string agent_name = 2;
  int32 heartbeat_interval_seconds = 3;
}

message AgentHeartbeat {
  int64 timestamp_unix_ms = 1;
}

// Full replacement set of probe targets the agent should run. Sent right
// after the hello exchange and again whenever the site's monitoring targets
// change.
message ProbeConfig {
  repeated ProbeTargetSpec targets = 1;
}

message ProbeTargetSpec {
  string target_id = 1;
  string address = 2;
  // icmp | tcp (matches ProbeMode on the server)
  string probe_mode = 3;
  // tcp probes only; 0 = unset
  int32 port = 4;
  int32 poll_interval_seconds = 5;
  int32 ping_count = 6;
  // Informational for agent logs; the server re-derives type at write time.
  string target_type = 7;
  // Optional source address to bind probes to (multi-WAN policy routing).
  string source_ip = 8;
}

message ProbeResultBatch {
  repeated ProbeResult results = 1;
}

// ---- SNMP monitoring at the site ----
// The server builds the config from the site's monitoring settings and its
// console's device list, and pushes it over the tunnel; the agent polls the
// devices locally and streams raw counters back. Rate computation and storage
// happen server-side. Credentials ride the tunnel, which is expected to run
// over a VPN or otherwise trusted link.

message SnmpConfig {
  bool enabled = 1;
  string version = 2;   // v2c | v3
  string community = 3; // v2c
  string username = 4;  // v3
  string auth_password = 5;
  int32 fast_interval_seconds = 6;
  int32 medium_interval_seconds = 7;
  repeated SnmpDeviceSpec devices = 8;
}

message SnmpDeviceSpec {
  string mac = 1;
  string ip = 2;
  string name = 3;
  string device_type = 4; // gateway | switch | ap
}

message SnmpResultBatch {
  repeated SnmpInterfaceSample interfaces = 1;
  repeated SnmpDeviceHealthSample health = 2;
}

message SnmpInterfaceSample {
  string device_mac = 1;
  string if_name = 2;
  string port_id = 3;
  int64 in_octets = 4;
  int64 out_octets = 5;
  int64 speed_bps = 6;
  bool hc_counters = 7;
  int32 oper_status = 8;
  int64 errors_in = 9;
  int64 errors_out = 10;
  int64 discards_in = 11;
  int64 discards_out = 12;
  int64 ucast_pkts_in = 13;
  int64 ucast_pkts_out = 14;
  int64 mcast_pkts_in = 15;
  int64 mcast_pkts_out = 16;
  int64 bcast_pkts_in = 17;
  int64 bcast_pkts_out = 18;
  int64 timestamp_unix_ms = 19;
}

message SnmpDeviceHealthSample {
  string device_mac = 1;
  string device_type = 2;
  optional double cpu_percent = 3;
  optional int64 memory_total_kb = 4;
  optional int64 memory_used_kb = 5;
  optional double memory_used_percent = 6;
  optional double temperature_c = 7;
  optional int64 uptime_seconds = 8;
  int64 timestamp_unix_ms = 9;
}

message ProbeResult {
  string target_id = 1;
  int64 timestamp_unix_ms = 2;
  bool success = 3;
  int32 sent = 4;
  int32 received = 5;
  double loss_percent = 6;
  optional double rtt_min_ms = 7;
  optional double rtt_avg_ms = 8;
  optional double rtt_max_ms = 9;
  optional double jitter_ms = 10;
}

// ---- LAN iperf3 client tests run at the site ----
// The central server can't reach a secondary site's LAN devices directly, so
// it asks the agent to run the iperf3 client locally against a site-local
// target and return the raw `iperf3 -J` output. The server still orchestrates
// the test (starting/stopping the device's iperf3 server over the tunnelled
// SSH path) and does all parsing, path analysis, and storage; only the client
// run itself moves to the agent so throughput reflects the site LAN. Requests
// are correlated by request_id, mirroring the proxy connection_id pattern.

message Iperf3ClientRequest {
  int64 request_id = 1;
  string host = 2;
  int32 port = 3;
  int32 duration_seconds = 4;
  int32 parallel_streams = 5;
  // Reverse mode (-R): server sends to client, i.e. the "To Device" direction.
  bool reverse = 6;
}

message Iperf3ClientResult {
  int64 request_id = 1;
  bool success = 2;
  // The iperf3 -J JSON on success, or an error message otherwise. Matches the
  // (success, output) contract the server's local iperf3 run already returns.
  string output = 3;
}
